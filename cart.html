<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savat - For.Ever Cosmetics</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="favicon-192x192.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                    <img src="assets/logo.png" alt="Forever Kosmetika" class="logo-img">
                </a>
            </div>
            <div class="header-actions">
                <a href="index.html" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    <span>Do'konga qaytish</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="checkout-page">
        <div class="checkout-container">
            <div id="cartContent">
                <!-- Savat mazmuni JS orqali yuklanadi -->
            </div>
        </div>
    </main>



    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-db.js"></script>
    <script src="telegram-config.js"></script>
    <script src="telegram-submit.js"></script>
    <script src="script_helpers.js"></script>
    <script src="script.js"></script>
    <script src="mobile-ux.js"></script> <!-- Mobile UX Optimization -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Savatni ko'rsatish
            if (typeof renderCartPage === 'function') {
                renderCartPage();
            } else {
                // Agar funksiya topilmasa, script.js yuklanishini kutish
                setTimeout(() => {
                    if (typeof renderCartPage === 'function') renderCartPage();
                }, 500);
            }
        });
    </script>
</body>

</html>
