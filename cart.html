<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savat - For.Ever Cosmetics</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="favicon-192x192.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        .checkout-page {
            padding-top: 100px;
            padding-bottom: 32px;
            min-height: 100vh;
            background: #f8f9fe;
        }

        .checkout-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Checkout sahifasida ichki scrollni olib tashlash
           va select dropdownlari kartadan chiroyli tashqariga chiqishi uchun */
        .checkout-page .modal-body-layout {
            overflow: visible;
        }

        .checkout-page .order-section-card,
        .checkout-page .order-summary-card {
            overflow: visible;
        }

        .checkout-header {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .checkout-header h1 {
            font-family: var(--font-display);
            font-size: 2.5rem;
            color: var(--text-primary);
        }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .step-container {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .step-container.active {
            display: block;
        }

        .empty-cart-page {
            text-align: center;
            padding: 5rem 0;
        }

        .empty-cart-page h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .empty-cart-page p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* Adjustments for standalone page */
        .cart-full-modal,
        .order-full-modal {
            box-shadow: none !important;
            border: none !important;
            max-width: 100% !important;
            width: 100% !important;
            background: transparent !important;
            animation: none !important;
        }

        .cart-full-modal .modal-content,
        .order-full-modal .modal-content {
            padding: 0 !important;
            box-shadow: none !important;
            border: none !important;
            background: transparent !important;
        }

        .cart-full-modal .modal-header,
        .order-full-modal .modal-header {
            display: none !important;
        }

        .cart-full-modal .modal-body,
        .order-full-modal .modal-body {
            padding: 0 !important;
        }

        @media (max-width: 768px) {
            .checkout-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                    <img src="assets/logo.png" alt="Forever Kosmetika" class="logo-img">
                </a>
            </div>
            <div class="header-actions">
                <a href="index.html" class="back-link">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"></path>
                    </svg>
                    <span>Do'konga qaytish</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="checkout-page">
        <div class="checkout-container">
            <div id="cartContent">
                <!-- Savat mazmuni JS orqali yuklanadi -->
            </div>
        </div>
    </main>



    <script src="firebase-config.js"></script>
    <script src="firebase-db.js"></script>
    <script src="telegram-config.js"></script>
    <script src="telegram-submit.js"></script>
    <script src="script_helpers.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Savatni ko'rsatish
            if (typeof renderCartPage === 'function') {
                renderCartPage();
            } else {
                // Agar funksiya topilmasa, script.js yuklanishini kutish
                setTimeout(() => {
                    if (typeof renderCartPage === 'function') renderCartPage();
                }, 500);
            }
        });
    </script>
</body>

</html>
