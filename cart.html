<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savat - For.Ever Cosmetics</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="favicon-192x192.png">
    <link rel="stylesheet" href="styles.css?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Header -->
    <header class="header" id="siteHeader">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none;">
                    <span class="logo-text">For.Ever</span>
                </a>
            </div>
            
            <div class="nav-menu-wrapper">
                <ul class="nav-menu">
                    <li><a href="index.html#home" class="nav-link">Bosh sahifa</a></li>
                    <li><a href="index.html#products" class="nav-link">Mahsulotlar</a></li>
                    <li><a href="index.html#about" class="nav-link">Biz haqimizda</a></li>
                    <li><a href="index.html#contact" class="nav-link">Bog'lanish</a></li>
                </ul>
            </div>

            <div class="header-actions">
                <div class="search-wrapper">
                    <input type="text" class="search-input" placeholder="Qidirish..." id="searchInput">
                    <button class="action-btn search-trigger" title="Qidiruv">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </button>
                </div>
                <a href="wishlist.html" class="action-btn" title="Sevimlilar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                </a>
                <a href="cart.html" class="action-btn cart-btn-icon active" title="Savat">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"></path>
                        <path d="M3 6h18"></path>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <span class="cart-count">0</span>
                </a>
                <a href="profile.html" class="action-btn" title="Profil">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </a>
                <button class="menu-toggle" id="menuToggle">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>

    <main class="checkout-page">
        <div class="checkout-container">
            <div id="cartContent">
                <!-- Savat mazmuni JS orqali yuklanadi -->
            </div>
        </div>
    </main>



    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="firebase-db.js"></script>
    <script src="telegram-config.js"></script>
    <script src="telegram-submit.js"></script>
    <script src="script_helpers.js"></script>
    <script src="script.js"></script>
    <script src="mobile-ux.js"></script> <!-- Mobile UX Optimization -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Savatni ko'rsatish
            if (typeof renderCartPage === 'function') {
                renderCartPage();
            } else {
                // Agar funksiya topilmasa, script.js yuklanishini kutish
                setTimeout(() => {
                    if (typeof renderCartPage === 'function') renderCartPage();
                }, 500);
            }
        });
    </script>
</body>

</html>
