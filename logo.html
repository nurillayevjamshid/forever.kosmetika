<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Cosmetics</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #fff;
            font-family: 'Arial', sans-serif;
        }
        .logo {
            text-align: center;
            position: relative;
        }
        .logo-main {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
            color: #000;
            font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
        }
        .logo-sub {
            font-size: 72px;
            font-weight: 300;
            letter-spacing: 8px;
            color: #000;
            margin-top: -10px;
            font-family: 'Arial', sans-serif;
        }
        .logo-reflection {
            transform: scaleY(-1);
            opacity: 0.15;
            margin-top: -20px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
            -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 80%);
        }
    </style>
</head>
<body>
    <div class="logo">
        <div class="logo-main">FOREVER</div>
        <div class="logo-sub">KOSMETIKA</div>
        <div class="logo-reflection">
            <div class="logo-sub">KOSMETIKA</div>
        </div>
    </div>
</body>
</html>
