<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sevimlilar - For.Ever Cosmetics</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="icon" href="favicon-32x32.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="favicon-192x192.png">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        .wishlist-page {
            padding-top: 140px;
            padding-bottom: 80px;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdf9f6 0%, #f5efeb 100%);
            position: relative;
        }

        .wishlist-page::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 300px;
            background: linear-gradient(135deg, rgba(226, 158, 125, 0.08) 0%, rgba(125, 107, 93, 0.05) 100%);
            pointer-events: none;
        }

        .wishlist-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .wishlist-header {
            margin-bottom: 4rem;
            text-align: center;
            animation: fadeInDown 0.8s ease-out;
        }

        .wishlist-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #3D2B1F 0%, #7D6B5D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .wishlist-header p {
            color: var(--text-secondary);
            font-size: 1.15rem;
            font-weight: 300;
            letter-spacing: 0.3px;
        }

        .wishlist-stats {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 2rem;
            font-weight: 700;
            color: #E29E7D;
            font-family: 'Playfair Display', serif;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 0.5rem;
        }

        .wishlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 32px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        /* Wishlist Card Enhancements */
        .wishlist-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(61, 43, 31, 0.08);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
            border: 1px solid rgba(226, 158, 125, 0.15);
        }

        .wishlist-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 20px 40px rgba(61, 43, 31, 0.15);
            border-color: rgba(226, 158, 125, 0.4);
        }

        .wishlist-card .remove-wishlist {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.95);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #E29E7D;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px rgba(226, 158, 125, 0.2);
            backdrop-filter: blur(10px);
        }

        .wishlist-card .remove-wishlist:hover {
            background: linear-gradient(135deg, #E29E7D 0%, #D67D5C 100%);
            color: white;
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 8px 20px rgba(226, 158, 125, 0.4);
        }

        .wishlist-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #E29E7D 0%, #D67D5C 100%);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            z-index: 9;
            box-shadow: 0 4px 12px rgba(226, 158, 125, 0.3);
        }

        .wishlist-img-wrapper {
            position: relative;
            padding-top: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #f8f9fe 0%, #f0f0f0 100%);
        }

        .wishlist-img-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(226, 158, 125, 0) 0%, rgba(226, 158, 125, 0.1) 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }

        .wishlist-card:hover .wishlist-img-wrapper::after {
            opacity: 1;
        }

        .wishlist-img-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .wishlist-card:hover .wishlist-img-wrapper img {
            transform: scale(1.12);
        }

        .wishlist-info {
            padding: 24px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .wishlist-info h3 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-weight: 600;
            line-height: 1.4;
            transition: color 0.3s ease;
        }

        .wishlist-card:hover .wishlist-info h3 {
            color: #E29E7D;
        }

        .wishlist-info .category {
            font-size: 0.8rem;
            color: #E29E7D;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 600;
        }

        .wishlist-price {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            margin-top: auto;
            font-family: 'Playfair Display', serif;
            background: linear-gradient(135deg, #3D2B1F 0%, #7D6B5D 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .wishlist-actions {
            display: flex;
            gap: 12px;
        }

        .btn-add-cart {
            flex: 1;
            background: linear-gradient(135deg, #E29E7D 0%, #D67D5C 100%);
            color: white;
            border: none;
            padding: 14px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 12px rgba(226, 158, 125, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-add-cart:hover {
            box-shadow: 0 8px 24px rgba(226, 158, 125, 0.4);
            transform: translateY(-3px);
        }

        .btn-add-cart:active {
            transform: translateY(-1px);
        }

        /* Empty State */
        .empty-wishlist {
            text-align: center;
            padding: 100px 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(61, 43, 31, 0.08);
            max-width: 600px;
            margin: 0 auto;
            border: 1px solid rgba(226, 158, 125, 0.15);
            animation: fadeInUp 0.8s ease-out;
        }

        .empty-icon {
            font-size: 6rem;
            margin-bottom: 30px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .empty-wishlist h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            margin-bottom: 15px;
            color: var(--text-primary);
            font-weight: 700;
        }

        .empty-wishlist p {
            color: var(--text-secondary);
            margin-bottom: 35px;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .btn-primary {
            display: inline-block;
            background: linear-gradient(135deg, #E29E7D 0%, #D67D5C 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 12px rgba(226, 158, 125, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border: none;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .btn-primary:hover {
            box-shadow: 0 8px 24px rgba(226, 158, 125, 0.4);
            transform: translateY(-3px);
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .wishlist-header h1 {
                font-size: 2.8rem;
            }

            .wishlist-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 24px;
            }
        }

        @media (max-width: 768px) {
            .wishlist-page {
                padding-top: 120px;
                padding-bottom: 60px;
            }

            .wishlist-header {
                margin-bottom: 3rem;
            }

            .wishlist-header h1 {
                font-size: 2.2rem;
            }

            .wishlist-header p {
                font-size: 1rem;
            }

            .wishlist-stats {
                gap: 2rem;
            }

            .stat-number {
                font-size: 1.5rem;
            }

            .wishlist-grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: 16px;
            }

            .wishlist-card {
                border-radius: 12px;
            }

            .wishlist-info {
                padding: 16px;
            }

            .wishlist-info h3 {
                font-size: 1.1rem;
            }

            .wishlist-price {
                font-size: 1.3rem;
            }

            .btn-add-cart {
                padding: 12px 14px;
                font-size: 0.9rem;
            }

            .empty-wishlist {
                padding: 60px 20px;
                border-radius: 16px;
            }

            .empty-icon {
                font-size: 4rem;
                margin-bottom: 20px;
            }

            .empty-wishlist h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 480px) {
            .wishlist-page {
                padding-top: 100px;
                padding-bottom: 40px;
            }

            .wishlist-header h1 {
                font-size: 1.8rem;
            }

            .wishlist-header p {
                font-size: 0.95rem;
            }

            .wishlist-stats {
                gap: 1.5rem;
                margin-top: 1.5rem;
            }

            .stat-number {
                font-size: 1.3rem;
            }

            .stat-label {
                font-size: 0.75rem;
            }

            .wishlist-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .wishlist-card {
                border-radius: 12px;
            }

            .wishlist-info {
                padding: 14px;
            }

            .wishlist-info h3 {
                font-size: 1rem;
            }

            .wishlist-price {
                font-size: 1.2rem;
                margin-bottom: 15px;
            }

            .btn-add-cart {
                padding: 10px 12px;
                font-size: 0.85rem;
            }

            .empty-wishlist {
                padding: 40px 16px;
            }

            .empty-icon {
                font-size: 3.5rem;
            }

            .empty-wishlist h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                    <img src="assets/logo.png" alt="Forever Kosmetika" class="logo-img">
                </a>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html#home" class="nav-link">Bosh sahifa</a></li>
                <li><a href="index.html#products" class="nav-link">Mahsulotlar</a></li>
                <li><a href="wishlist.html" class="nav-link active">Sevimlilar</a></li>
                <li><a href="profile.html" class="nav-link">Profil</a></li>
            </ul>
            <div class="header-actions">
                <a href="cart.html" class="cart-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"></path>
                        <path d="M3 6h18"></path>
                        <path d="M16 10a4 4 0 0 1-8 0"></path>
                    </svg>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </nav>
    </header>

    <main class="wishlist-page">
        <div class="wishlist-container">
            <div class="wishlist-header">
                <h1>Sevimlilar</h1>
                <p id="wishlistCountText">Sizga yoqqan mahsulotlar to'plami</p>
                <div class="wishlist-stats" id="wishlistStats" style="display: none;">
                    <div class="stat-item">
                        <div class="stat-number" id="totalItems">0</div>
                        <div class="stat-label">Mahsulot</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="totalPrice">0</div>
                        <div class="stat-label">Jami narx</div>
                    </div>
                </div>
            </div>

            <div id="wishlistGrid" class="wishlist-grid">
                <!-- Wishlist items will be loaded here -->
            </div>

            <div id="emptyWishlist" class="empty-wishlist" style="display: none;">
                <span class="empty-icon">💖</span>
                <h2>Sevimlilar ro'yxati bo'sh</h2>
                <p>Hali hech qanday mahsulotni sevimlilarga qo'shmadingiz. O'zingizga yoqqan mahsulotlarni shu yerda saqlashingiz mumkin.</p>
                <a href="index.html#products" class="btn-primary">Xaridni boshlash</a>
            </div>
        </div>
    </main>

    <script src="firebase-config.js"></script>
    <script src="firebase-db.js"></script>
    <script src="script_helpers.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Wishlist sahifasini yuklash
            initWishlistPage();
        });

        async function initWishlistPage() {
            const grid = document.getElementById('wishlistGrid');
            const emptyState = document.getElementById('emptyWishlist');
            const countText = document.getElementById('wishlistCountText');
            const statsContainer = document.getElementById('wishlistStats');
            const totalItemsEl = document.getElementById('totalItems');
            const totalPriceEl = document.getElementById('totalPrice');
            
            // Wishlist ma'lumotlarini olish
            let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
            
            // Agar mahsulotlar hali yuklanmagan bo'lsa, kutish
            if (typeof products === 'undefined' || products.length === 0) {
                await loadProducts();
            }

            renderWishlist();

            function renderWishlist() {
                wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
                grid.innerHTML = '';
                
                if (wishlist.length === 0) {
                    grid.style.display = 'none';
                    emptyState.style.display = 'block';
                    statsContainer.style.display = 'none';
                    countText.textContent = "Sizda hozircha sevimlilar yo'q";
                    return;
                }

                grid.style.display = 'grid';
                emptyState.style.display = 'none';
                statsContainer.style.display = 'flex';
                
                let totalPrice = 0;
                wishlist.forEach(productId => {
                    const product = products.find(p => p.id.toString() === productId.toString());
                    if (product) {
                        const card = createWishlistCard(product);
                        grid.appendChild(card);
                        totalPrice += product.price || 0;
                    }
                });

                countText.textContent = `${wishlist.length} ta mahsulot saqlangan`;
                totalItemsEl.textContent = wishlist.length;
                totalPriceEl.textContent = formatPrice(totalPrice);
            }

            function createWishlistCard(product) {
                const card = document.createElement('div');
                card.className = 'wishlist-card';
                
                const fallback = typeof getProductFallbackImage === 'function' ? getProductFallbackImage(product) : 'assets/logo.png';
                const imageUrl = product.imageUrl || product.image || fallback;

                card.innerHTML = `
                    <button class="remove-wishlist" onclick="removeFromWishlistPage('${product.id}')" title="O'chirish">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                    <div class="wishlist-img-wrapper" onclick="window.location.href='index.html?product=${product.id}'" style="cursor:pointer">
                        <img src="${imageUrl}" alt="${product.name}" onerror="this.src='${fallback}'">
                    </div>
                    <div class="wishlist-info">
                        <span class="category">${product.category || 'Kosmetika'}</span>
                        <h3>${product.name}</h3>
                        <div class="wishlist-price">${formatPrice(product.price)} so'm</div>
                        <div class="wishlist-actions">
                            <button class="btn-add-cart" onclick="addToCartFromWishlist('${product.id}')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4H6z"></path>
                                    <path d="M3 6h18"></path>
                                    <path d="M16 10a4 4 0 0 1-8 0"></path>
                                </svg>
                                Savatga qo'shish
                            </button>
                        </div>
                    </div>
                `;
                return card;
            }

            // Global funksiyalar
            window.removeFromWishlistPage = function(productId) {
                let wishlist = JSON.parse(localStorage.getItem('wishlist')) || [];
                wishlist = wishlist.filter(id => id.toString() !== productId.toString());
                localStorage.setItem('wishlist', JSON.stringify(wishlist));
                renderWishlist();
            };

            window.addToCartFromWishlist = function(productId) {
                const product = products.find(p => p.id.toString() === productId.toString());
                if (product) {
                    let cart = JSON.parse(localStorage.getItem('cart')) || [];
                    const existingItem = cart.find(item => item.id.toString() === productId.toString());
                    
                    if (existingItem) {
                        existingItem.quantity += 1;
                    } else {
                        cart.push({
                            id: product.id,
                            name: product.name,
                            price: product.price,
                            image: product.imageUrl || product.image,
                            quantity: 1
                        });
                    }
                    
                    localStorage.setItem('cart', JSON.stringify(cart));
                    alert('Mahsulot savatga qo\'shildi!');
                }
            };
        }
    </script>
</body>

</html>
